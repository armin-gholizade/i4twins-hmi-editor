<h2 mat-dialog-title>Delete label?</h2>

<mat-dialog-content>
  This label will be removed from the drawing.
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="cancel()">Cancel</button>
  <button mat-flat-button color="warn" type="button" (click)="confirm()">
    Delete
  </button>
</mat-dialog-actions>
