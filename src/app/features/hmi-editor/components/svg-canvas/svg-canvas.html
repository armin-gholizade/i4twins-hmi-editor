<div class="canvas-container">
  <div class="canvas-header">
    <span>Plant Drawing</span>
  </div>

  <div class="canvas-content">
    @if (errorMessage()) {
      <div class="canvas-message error">{{ errorMessage() }}</div>
    } @else if (isLoading()) {
      <div class="canvas-message">Loading drawing...</div>
    }

    <div
      #svgHost
      class="svg-host"
      (pointerdown)="onCanvasPointerDown($event)"
      (contextmenu)="onCanvasContextMenu($event)"
    ></div>
  </div>
</div>
